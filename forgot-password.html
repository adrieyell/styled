<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password – Styled</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/auth.css" />
    <style>
      /* ── Page-specific overrides ── */
      .fp-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg, #faf9f7);
        padding: 2rem;
      }

      .fp-card {
        background: #fff;
        border: 1px solid #e8e4df;
        border-radius: 4px;
        padding: 3rem 2.5rem;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.06);
      }

      .fp-logo {
        display: block;
        margin: 0 auto 2rem;
        text-align: center;
      }

      .fp-logo img {
        height: 36px;
        width: auto;
      }

      .fp-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 2rem;
        font-weight: 400;
        letter-spacing: 0.02em;
        color: #1a1a1a;
        margin: 0 0 0.5rem;
        text-align: center;
      }

      .fp-subtitle {
        font-family: "Jost", sans-serif;
        font-size: 0.85rem;
        font-weight: 300;
        color: #888;
        text-align: center;
        margin: 0 0 2rem;
        line-height: 1.6;
      }

      /* Reuse field styles from auth.css via shared classes */
      .fp-card .field-group {
        margin-bottom: 1.25rem;
      }

      .fp-success {
        display: none;
        text-align: center;
        padding: 1rem 0;
      }

      .fp-success-icon {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: #3a6b4a;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.25rem;
      }

      .fp-success-icon svg {
        width: 26px;
        height: 26px;
      }

      .fp-success h2 {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.6rem;
        font-weight: 400;
        color: #1a1a1a;
        margin: 0 0 0.5rem;
      }

      .fp-success p {
        font-family: "Jost", sans-serif;
        font-size: 0.85rem;
        font-weight: 300;
        color: #666;
        line-height: 1.65;
        margin: 0 0 1.75rem;
      }

      .fp-back {
        font-family: "Jost", sans-serif;
        font-size: 0.82rem;
        font-weight: 400;
        color: #888;
        text-align: center;
        margin-top: 1.25rem;
      }

      .fp-back a {
        color: #1a1a1a;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .fp-back a:hover {
        color: #3a6b4a;
      }
    </style>
  </head>
  <body>
    <div class="fp-wrapper">
      <div class="fp-card">
        <a href="auth.html" class="fp-logo">
          <img src="assets/images/logo_withtext.png" alt="Styled" />
        </a>

        <!-- ── Form view ── -->
        <div id="fp-form-view">
          <h1 class="fp-title">Forgot Password</h1>
          <p class="fp-subtitle">
            Enter the email address linked to your account and we'll send you a
            reset link.
          </p>

          <form id="fp-form" novalidate>
            <div class="field-group">
              <div class="field-wrap" id="fw-fp-email">
                <span class="fi">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  >
                    <rect x="2" y="4" width="20" height="16" rx="2" />
                    <path d="M2 8l10 7 10-7" />
                  </svg>
                </span>
                <input
                  type="email"
                  id="fp-email"
                  placeholder="Email Address"
                  autocomplete="email"
                />
              </div>
              <span class="field-err" id="er-fp-email"></span>
            </div>

            <button type="submit" class="btn-submit" id="btn-fp">
              <span class="btn-label">Send Reset Link</span>
              <span class="btn-spin"><span class="spin-ring"></span></span>
            </button>
          </form>

          <p class="fp-back">
            Remember your password? <a href="auth.html">Log In</a>
          </p>
        </div>

        <!-- ── Success view ── -->
        <div id="fp-success-view" class="fp-success">
          <div class="fp-success-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2.5"
            >
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </div>
          <h2>Check Your Email</h2>
          <p>
            If an account exists for that address, you'll receive a password
            reset link shortly. It expires in&nbsp;1&nbsp;hour.
          </p>
          <a
            href="auth.html"
            class="btn-submit"
            style="
              display: inline-block;
              text-decoration: none;
              text-align: center;
            "
          >
            Back to Log In
          </a>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const API_BASE = "/styled";

      // ── Toast ──────────────────────────────────────────────────────────────
      let toastT;
      function toast(msg, type = "") {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "toast " + type;
        el.classList.add("show");
        clearTimeout(toastT);
        toastT = setTimeout(() => el.classList.remove("show"), 3200);
      }

      // ── Field helpers ──────────────────────────────────────────────────────
      function setErr(msg) {
        document.getElementById("er-fp-email").textContent = msg;
        document.getElementById("fw-fp-email").classList.add("is-error");
      }
      function clrErr() {
        document.getElementById("er-fp-email").textContent = "";
        document.getElementById("fw-fp-email").classList.remove("is-error");
      }

      function validEmail(v) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
      }

      // ── Loading button ─────────────────────────────────────────────────────
      function setLoading(loading) {
        const btn = document.getElementById("btn-fp");
        btn.classList.toggle("loading", loading);
        btn.disabled = loading;
      }

      // ── Form submit ────────────────────────────────────────────────────────
      document
        .getElementById("fp-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          clrErr();

          const email = document.getElementById("fp-email").value.trim();

          if (!email) {
            setErr("Please enter your email address.");
            return;
          }
          if (!validEmail(email)) {
            setErr("Please enter a valid email address.");
            return;
          }

          setLoading(true);
          try {
            const res = await fetch(
              API_BASE + "/php/auth/forgot-password.php",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email }),
              },
            );
            // Always show success view regardless of response (security)
            document.getElementById("fp-form-view").style.display = "none";
            document.getElementById("fp-success-view").style.display = "block";
          } catch {
            toast("Network error. Please try again.", "error");
          } finally {
            setLoading(false);
          }
        });

      document.getElementById("fp-email").addEventListener("input", clrErr);
    </script>
  </body>
</html>
